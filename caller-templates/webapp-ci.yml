# Thin caller — delegates to the org-wide reusable Webapp CI workflow.
# See: https://github.com/teqbench/.github/.github/workflows/webapp-ci.yml
#
# Use this for Vercel-deployed webapps. Use ci.yml instead for npm
# packages — it runs tests, builds, and writes badges that webapp
# repos generally don't need.

name: TeqBench Webapp - CI Workflow

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ci-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ci:
    uses: teqbench/.github/.github/workflows/webapp-ci.yml@main
    secrets: inherit
