# ─────────────────────────────────────────────────────────────
# Sync — Reusable Workflow (Merge main back to dev)
# ─────────────────────────────────────────────────────────────
# Keeps dev in sync with main after every merge.
# Called by thin caller workflows in each consuming repo.
# ─────────────────────────────────────────────────────────────

name: Sync (Reusable)

on:
  workflow_call:

permissions: {}

jobs:
  sync:
    name: Merge main → dev
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Merge main into dev
        run: |
          set -euo pipefail

          git config user.name "teqbench-automation[bot]"
          git config user.email "263536528+teqbench-automation[bot]@users.noreply.github.com"

          git fetch origin main dev
          git checkout dev

          # Nothing to do if main is already merged into dev.
          if git merge-base --is-ancestor origin/main dev; then
            echo "✅ dev already contains main — nothing to sync"
            exit 0
          fi

          # Attempt the merge. On conflict, abort and fail loudly so a human
          # can open a release/* or sync/* branch to resolve manually.
          if ! git merge origin/main --no-edit -m "chore: sync main into dev [skip ci]"; then
            git merge --abort
            echo "::error::Merge conflict syncing main into dev. Open a release/* or sync/* branch to resolve."
            exit 1
          fi

          # If the push is rejected (concurrent sync run), fail rather than
          # silently dropping the merge commit. The next push to main will
          # re-trigger this workflow.
          git push origin dev
