# ─────────────────────────────────────────────────────────────
# Claude Code — Reusable Workflow (AI-Powered Issue & PR Assistance)
# ─────────────────────────────────────────────────────────────
# Responds to @claude mentions in issues and PRs.
# Called by thin caller workflows in each consuming repo.
#
# Note: The caller must define the event triggers (issue_comment,
# pull_request_review_comment, issues) and the @claude mention
# filter, since workflow_call cannot have event triggers.
# ─────────────────────────────────────────────────────────────

name: Claude Code (Reusable)

on:
  workflow_call:

permissions: {}

jobs:
  claude:
    name: Claude Code
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          client-id: ${{ secrets.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: teqbench

      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          submodules: true
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Run Claude Code
        uses: anthropics/claude-code-action@0cb4f3e5e764d2e00407d29b6bf0aa9df0976d88 # v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: >-
            --max-turns 10
            --allowedTools
            "View,Edit,Write,GlobTool,GrepTool,BatchTool,Bash(git status:*),Bash(git diff:*),Bash(git log:*),Bash(git branch:*),Bash(git show:*),Bash(git checkout:*),Bash(git add:*),Bash(git commit:*),Bash(git push origin:*),Bash(npm run:*),Bash(npm ci:*),Bash(npx:*)"
