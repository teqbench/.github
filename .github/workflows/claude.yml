# ─────────────────────────────────────────────────────────────
# Claude Code — Reusable Workflow (AI-Powered Issue & PR Assistance)
# ─────────────────────────────────────────────────────────────
# Responds to @claude mentions in issues and PRs.
# Called by thin caller workflows in each consuming repo.
#
# Note: The caller must define the event triggers (issue_comment,
# pull_request_review_comment, issues) and the @claude mention
# filter, since workflow_call cannot have event triggers.
# ─────────────────────────────────────────────────────────────

name: Claude Code (Reusable)

on:
  workflow_call:

permissions: {}

jobs:
  claude:
    name: Claude Code
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: teqbench

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          submodules: true
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Run Claude Code
        uses: anthropics/claude-code-action@38ec876110f9fbf8b950c79f534430740c3ac009 # v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: >-
            --max-turns 10
            --allowedTools
            "View,Edit,Write,GlobTool,GrepTool,BatchTool,Bash(git status:*),Bash(git diff:*),Bash(git log:*),Bash(git branch:*),Bash(git show:*),Bash(git checkout:*),Bash(git add:*),Bash(git commit:*),Bash(git push origin:*),Bash(npm run:*),Bash(npm ci:*),Bash(npx:*)"
