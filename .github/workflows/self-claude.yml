# Self-thin-caller — runs the org-wide reusable Claude Code workflow
# against this repo. Named with the self- prefix to distinguish it from
# the reusable claude.yml that lives in this same directory.
#
# Note: Event triggers and @claude filters live here because reusable
# workflows only support workflow_call triggers.

name: TeqBench .github - Claude Code Workflow

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened]

concurrency:
  group: claude-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'issues' && contains(github.event.issue.body, '@claude'))
    uses: teqbench/.github/.github/workflows/claude.yml@main
    secrets: inherit
