# ─────────────────────────────────────────────────────────────
# Webapp CI — Reusable Workflow (Lint, Typecheck, Audit)
# ─────────────────────────────────────────────────────────────
# Tailored for non-package consumers (Vercel-deployed webapps).
# Runs typecheck, lint, and the org audit gate; does NOT run
# format:check, tests, builds, or badge writes.
#
# Why a separate workflow from ci.yml: the package ci.yml assumes
# a meaningful test suite (vitest exits non-zero on "No test files
# found"), runs builds against an ng-packagr target, and writes
# per-repo badges. None of those fit a Vercel-deployed webapp,
# whose build is performed by the Vercel GitHub app on every push.
#
# Called by thin caller workflows in each consuming webapp repo.
# All secrets are passed via `secrets: inherit` from the caller.
# ─────────────────────────────────────────────────────────────

name: Webapp CI (Reusable)

on:
  workflow_call:

env:
  REPO_NAME: ${{ github.event.repository.name }}

permissions: {}

jobs:
  check:
    name: Lint, Typecheck & Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      packages: read

    steps:
      - name: Enforce source branch for main
        if: github.event_name == 'pull_request' && github.base_ref == 'main'
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          if [[ ! "$HEAD_REF" =~ ^(release/|hotfix/|release-please--) ]]; then
            echo "::error::PRs to main must come from release/*, hotfix/*, or release-please branches, not '$HEAD_REF'"
            exit 1
          fi

      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3
        with:
          client-id: ${{ secrets.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: teqbench

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          submodules: true
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version-file: ".nvmrc"
          registry-url: "https://npm.pkg.github.com"
          scope: "@teqbench"
          cache: "npm"

      - name: Install dependencies
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Audit dependencies
        run: |
          # Fetch the centralized allow-list from the .github repo.
          ALLOW_LIST=$(curl -sf \
            -H "Authorization: token ${{ steps.app-token.outputs.token }}" \
            -H "Accept: application/vnd.github.v3.raw" \
            "https://api.github.com/repos/teqbench/.github/contents/.github/audit-allow-list.json?ref=main" \
            || echo "[]")
          KNOWN_IDS=$(echo "$ALLOW_LIST" | jq -r '.[].id')

          # Run audit and capture JSON output
          AUDIT=$(npm audit --json 2>/dev/null || true)

          # Extract all advisory URLs from vulnerabilities with high or critical severity
          UNREVIEWED=()
          for ROW in $(echo "$AUDIT" | jq -r '
            .vulnerabilities // {} | to_entries[]
            | select(.value.severity == "high" or .value.severity == "critical")
            | .value.via[]
            | if type == "object" then .url // empty else empty end
          '); do
            GHSA_ID=$(basename "$ROW")
            if ! echo "$KNOWN_IDS" | grep -qx "$GHSA_ID"; then
              UNREVIEWED+=("$GHSA_ID")
            fi
          done

          if [ ${#UNREVIEWED[@]} -gt 0 ]; then
            echo "::error::Found ${#UNREVIEWED[@]} unreviewed high/critical vulnerabilities:"
            printf '  %s\n' "${UNREVIEWED[@]}"
            exit 1
          fi

          SUPPRESSED=$(echo "$ALLOW_LIST" | jq 'length')
          echo "✅ Audit passed ($SUPPRESSED known advisories suppressed)"

      - name: TypeScript check
        run: npm run typecheck

      - name: Lint
        run: npm run lint
