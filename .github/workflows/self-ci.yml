# Self-thin-caller — runs the org-wide reusable CI workflow against
# this repo so the org-level "ci / Lint, Typecheck & Test" required
# status check is satisfied here too. This repo has no package.json,
# so the entire npm chain (setup-node, npm ci, audit, lint, etc.) is
# skipped via `npm: false`. Only the source-branch enforcement and
# the build-status / build-number / version badge pushes actually
# run; the job still emits the required check name from the reusable's
# job definition.

name: TeqBench .github - CI Workflow

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ci-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ci:
    uses: teqbench/.github/.github/workflows/ci.yml@v3.0.0
    with:
      gist-id: ${{ vars.GIST_ID }}
      npm: false
    secrets: inherit
