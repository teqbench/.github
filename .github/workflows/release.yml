# ─────────────────────────────────────────────────────────────
# Release — Reusable Workflow (Versioning & Publish)
# ─────────────────────────────────────────────────────────────
# Powered by Google's release-please.
# Called by thin caller workflows in each consuming repo.
# ─────────────────────────────────────────────────────────────

name: Release (Reusable)

on:
  workflow_call:

permissions: {}

jobs:
  release:
    name: Release Please
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}

    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - id: release
        uses: googleapis/release-please-action@v4
        with:
          target-branch: main
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    name: Publish to GitHub Packages
    needs: release
    if: needs.release.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          registry-url: "https://npm.pkg.github.com"
          scope: "@teqbench"
          cache: "npm"

      - name: Install dependencies
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        run: npm run build

      # ── Documentation artifacts (written into dist/docs/ pre-publish) ──
      # These three files ride along in the published tarball so consumers
      # (teqbench.website, the tbx-readme-author skill) can read them from
      # node_modules at build time, version-aligned with the installed release.

      - name: Generate docs/api.json (API Extractor)
        run: |
          # Shared api-extractor config, parameterized by package name via
          # the <unscopedPackageName> macro. Works for any @teqbench package
          # built with ng-packagr under the standard naming convention.
          cat > api-extractor.generated.json <<'EOF'
          {
            "$schema": "https://developer.microsoft.com/json-schemas/api-extractor/v7/api-extractor.schema.json",
            "projectFolder": ".",
            "mainEntryPointFilePath": "<projectFolder>/dist/types/teqbench-<unscopedPackageName>.d.ts",
            "compiler": { "tsconfigFilePath": "<projectFolder>/tsconfig.json" },
            "apiReport": { "enabled": false },
            "docModel": {
              "enabled": true,
              "apiJsonFilePath": "<projectFolder>/dist/docs/api.json"
            },
            "dtsRollup": { "enabled": false },
            "tsdocMetadata": { "enabled": false },
            "messages": {
              "compilerMessageReporting": { "default": { "logLevel": "warning" } },
              "extractorMessageReporting": {
                "default": { "logLevel": "warning" },
                "ae-missing-release-tag": { "logLevel": "none" }
              },
              "tsdocMessageReporting": { "default": { "logLevel": "warning" } }
            }
          }
          EOF
          npx --yes @microsoft/api-extractor@7.58.2 run --local --config api-extractor.generated.json
          rm api-extractor.generated.json

      - name: Generate docs/compatibility.json
        run: |
          node -e "
            const fs = require('fs');
            const pkg = require('./package.json');
            const out = {
              package: pkg.name,
              version: pkg.version,
              engines: pkg.engines ?? {},
              peerDependencies: pkg.peerDependencies ?? {}
            };
            fs.mkdirSync('dist/docs', { recursive: true });
            fs.writeFileSync('dist/docs/compatibility.json', JSON.stringify(out, null, 2) + '\n');
          "

      - name: Generate docs/links.json
        run: |
          node -e "
            const fs = require('fs');
            const pkg = require('./package.json');
            const [org, repoName] = '${{ github.repository }}'.split('/');
            const unscoped = pkg.name.split('/').pop();
            const out = {
              package: pkg.name,
              version: pkg.version,
              repository: 'https://github.com/${{ github.repository }}',
              npm: 'https://github.com/' + org + '/' + repoName + '/pkgs/npm/' + unscoped,
              pages: 'https://' + org + '.github.io/' + repoName + '/',
              changelog: 'https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md'
            };
            fs.mkdirSync('dist/docs', { recursive: true });
            fs.writeFileSync('dist/docs/links.json', JSON.stringify(out, null, 2) + '\n');
          "

      - name: Publish
        run: npm publish ./dist
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
