# ─────────────────────────────────────────────────────────────
# Release — Reusable Workflow (Versioning & Publish)
# ─────────────────────────────────────────────────────────────
# Powered by Google's release-please.
# Called by thin caller workflows in each consuming repo.
# ─────────────────────────────────────────────────────────────

name: Release (Reusable)

on:
  workflow_call:
    inputs:
      publish:
        description: "Whether to run the publish job after release-please. Set to false for repos that use release-please for tagging/CHANGELOG only and have nothing to publish (e.g. .github, webapps deployed via Vercel, skill bundles)."
        type: boolean
        default: true

permissions: {}

jobs:
  release:
    name: Release Please
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}

    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          client-id: ${{ secrets.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5
        with:
          target-branch: main
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    name: Publish to GitHub Packages
    needs: release
    if: needs.release.outputs.release_created == 'true' && inputs.publish
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: ".nvmrc"
          registry-url: "https://npm.pkg.github.com"
          scope: "@teqbench"
          cache: "npm"

      - name: Install dependencies
        run: npm ci
        env:
          # Both names point at the same token. NODE_AUTH_TOKEN is the
          # convention used by actions/setup-node's auto-generated home
          # .npmrc. NPM_TOKEN is the convention Vercel sets natively, so
          # consumer repos with a custom .npmrc can use ${NPM_TOKEN}
          # without per-environment env-var overrides.
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        run: npm run build

      # ── Documentation artifacts (written into dist/docs/ pre-publish) ──
      # These three files ride along in the published tarball so consumers
      # (teqbench.website, the tbx-readme-author skill) can read them from
      # node_modules at build time, version-aligned with the installed release.

      - name: Generate docs/api.json (API Extractor)
        run: |
          # Shared api-extractor config, parameterized by package name via
          # the <unscopedPackageName> macro. Works for any @teqbench package
          # built with ng-packagr under the standard naming convention.
          cat > api-extractor.generated.json <<'EOF'
          {
            "$schema": "https://developer.microsoft.com/json-schemas/api-extractor/v7/api-extractor.schema.json",
            "projectFolder": ".",
            "mainEntryPointFilePath": "<projectFolder>/dist/types/teqbench-<unscopedPackageName>.d.ts",
            "compiler": { "tsconfigFilePath": "<projectFolder>/tsconfig.json" },
            "apiReport": { "enabled": false },
            "docModel": {
              "enabled": true,
              "apiJsonFilePath": "<projectFolder>/dist/docs/api.json"
            },
            "dtsRollup": { "enabled": false },
            "tsdocMetadata": { "enabled": false },
            "messages": {
              "compilerMessageReporting": { "default": { "logLevel": "warning" } },
              "extractorMessageReporting": {
                "default": { "logLevel": "warning" },
                "ae-missing-release-tag": { "logLevel": "none" }
              },
              "tsdocMessageReporting": { "default": { "logLevel": "warning" } }
            }
          }
          EOF
          npx --yes @microsoft/api-extractor@7.58.8 run --local --config api-extractor.generated.json
          rm api-extractor.generated.json

      - name: Generate docs/compatibility.json
        run: |
          node -e "
            const fs = require('fs');
            const pkg = require('./package.json');
            const out = {
              package: pkg.name,
              version: pkg.version,
              engines: pkg.engines ?? {},
              peerDependencies: pkg.peerDependencies ?? {}
            };
            fs.mkdirSync('dist/docs', { recursive: true });
            fs.writeFileSync('dist/docs/compatibility.json', JSON.stringify(out, null, 2) + '\n');
          "

      - name: Generate docs/metadata.json
        run: |
          node -e "
            const fs = require('fs');
            const pkg = require('./package.json');
            const [org, repoName] = '${{ github.repository }}'.split('/');
            const unscoped = pkg.name.split('/').pop();

            // Build intrinsic-fact fields first, omitting any that are
            // absent from the package.json so the output stays clean across
            // packages that don't populate every field.
            const out = { name: pkg.name, version: pkg.version };
            if (pkg.type) out.type = pkg.type;
            if (pkg.license) out.license = pkg.license;
            if (Array.isArray(pkg.keywords) && pkg.keywords.length) out.keywords = pkg.keywords;

            // Canonical URLs derived from GitHub context + package name.
            out.repository = 'https://github.com/${{ github.repository }}';
            out.npm = 'https://github.com/' + org + '/' + repoName + '/pkgs/npm/' + unscoped;
            out.pages = 'https://' + org + '.github.io/' + repoName + '/';
            out.changelog = 'https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md';

            fs.mkdirSync('dist/docs', { recursive: true });
            fs.writeFileSync('dist/docs/metadata.json', JSON.stringify(out, null, 2) + '\n');
          "

      - name: Publish
        run: npm publish ./dist
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.GITHUB_TOKEN }}
