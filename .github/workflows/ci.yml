# ─────────────────────────────────────────────────────────────
# CI — Reusable Workflow (Lint, Typecheck, Test, Build, Badges)
# ─────────────────────────────────────────────────────────────
# Called by thin caller workflows in each consuming repo.
# All secrets are passed via `secrets: inherit` from the caller.
# ─────────────────────────────────────────────────────────────

name: CI (Reusable)

on:
  workflow_call:
    inputs:
      gist-id:
        description: "Gist ID for badge storage (repo-specific)"
        required: true
        type: string
      coverage-threshold:
        description: "Minimum line-coverage percentage for a green badge. Below this the badge renders yellow."
        required: false
        type: number
        default: 80
      check-readme-drift:
        description: "Whether to assert that README.md's TypeScript / Node.js compatibility table matches package.json. Set to false for callers whose README does not have that table (e.g. .github, webapps, skill bundles)."
        required: false
        type: boolean
        default: true
      typecheck:
        description: "Whether to run `npm run typecheck`. Set to false for callers without a typecheck script."
        required: false
        type: boolean
        default: true
      lint:
        description: "Whether to run `npm run lint`. Set to false for callers whose code does not pass lint, or that have no lint configured."
        required: false
        type: boolean
        default: true
      format:
        description: "Whether to run `npm run format:check`. Set to false for callers whose code is not formatted with Prettier."
        required: false
        type: boolean
        default: true
      test:
        description: "Whether to run tests with coverage. Set to false for callers without a test suite (e.g. webapps deployed via Vercel). When false, the test and coverage badges are also skipped."
        required: false
        type: boolean
        default: true
      build:
        description: "Whether to run `npm run build`. Set to false for callers without a build script (e.g. the .github org config repo). Only applies to the build step itself; the audit step always runs."
        required: false
        type: boolean
        default: true

env:
  REPO_NAME: ${{ github.event.repository.name }}

permissions: {}

jobs:
  check:
    name: Lint, Typecheck & Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: read

    steps:
      - name: Enforce source branch for main
        if: github.event_name == 'pull_request' && github.base_ref == 'main'
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          if [[ ! "$HEAD_REF" =~ ^(release/|hotfix/|release-please--) ]]; then
            echo "::error::PRs to main must come from release/*, hotfix/*, or release-please branches, not '$HEAD_REF'"
            exit 1
          fi

      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3
        with:
          client-id: ${{ secrets.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: teqbench

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          submodules: true
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version-file: ".nvmrc"
          registry-url: "https://npm.pkg.github.com"
          scope: "@teqbench"
          cache: "npm"

      - name: Install dependencies
        run: npm ci
        env:
          # Both names point at the same token. NODE_AUTH_TOKEN is the
          # convention used by actions/setup-node's auto-generated home
          # .npmrc. NPM_TOKEN is the convention Vercel sets natively, so
          # consumer repos with a custom .npmrc can use ${NPM_TOKEN}
          # without per-environment env-var overrides.
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Audit dependencies
        run: |
          # Fetch the centralized allow-list from the .github repo.
          ALLOW_LIST=$(curl -sf \
            -H "Authorization: token ${{ steps.app-token.outputs.token }}" \
            -H "Accept: application/vnd.github.v3.raw" \
            "https://api.github.com/repos/teqbench/.github/contents/.github/audit-allow-list.json?ref=main" \
            || echo "[]")
          KNOWN_IDS=$(echo "$ALLOW_LIST" | jq -r '.[].id')

          # Run audit and capture JSON output
          AUDIT=$(npm audit --json 2>/dev/null || true)

          # Extract all advisory URLs from vulnerabilities with high or critical severity
          UNREVIEWED=()
          for ROW in $(echo "$AUDIT" | jq -r '
            .vulnerabilities // {} | to_entries[]
            | select(.value.severity == "high" or .value.severity == "critical")
            | .value.via[]
            | if type == "object" then .url // empty else empty end
          '); do
            GHSA_ID=$(basename "$ROW")
            if ! echo "$KNOWN_IDS" | grep -qx "$GHSA_ID"; then
              UNREVIEWED+=("$GHSA_ID")
            fi
          done

          if [ ${#UNREVIEWED[@]} -gt 0 ]; then
            echo "::error::Found ${#UNREVIEWED[@]} unreviewed high/critical vulnerabilities:"
            printf '  %s\n' "${UNREVIEWED[@]}"
            exit 1
          fi

          SUPPRESSED=$(echo "$ALLOW_LIST" | jq 'length')
          echo "✅ Audit passed ($SUPPRESSED known advisories suppressed)"

      - name: Check formatting
        if: inputs.format
        run: npm run format:check

      - name: TypeScript check
        if: inputs.typecheck
        run: npm run typecheck

      - name: Lint
        if: inputs.lint
        run: npm run lint

      - name: Run Tests with Coverage
        if: inputs.test
        run: npx vitest run --coverage --coverage.reporter=json-summary --reporter=default --reporter=json --outputFile=report.json

      - name: Evaluate Metrics
        id: eval_metrics
        if: always()
        run: |
          # 1. Coverage Logic
          COV_PATH="./coverage/coverage-summary.json"
          if [ -f "$COV_PATH" ]; then
            COV_PCT=$(jq -r '.total.lines.pct' "$COV_PATH")
            if [ "$COV_PCT" = "Unknown" ] || [ "$COV_PCT" = "null" ] || [ -z "$COV_PCT" ]; then
              echo "COV_MSG=N/A" >> "$GITHUB_ENV"
              echo "COV_COLOR=lightgrey" >> "$GITHUB_ENV"
            else
              echo "COV_MSG=${COV_PCT}%" >> "$GITHUB_ENV"
              if (( $(echo "$COV_PCT < ${{ inputs.coverage-threshold }}" | bc -l) )); then
                echo "COV_COLOR=yellow" >> "$GITHUB_ENV"
              else
                echo "COV_COLOR=brightgreen" >> "$GITHUB_ENV"
              fi
            fi
          else
            echo "COV_MSG=unknown" >> "$GITHUB_ENV"
            echo "COV_COLOR=yellow" >> "$GITHUB_ENV"
          fi

          # 2. Test Results Logic
          TEST_PATH="./report.json"
          if [ -f "$TEST_PATH" ]; then
            PASSED=$(jq '.numPassedTests // 0' "$TEST_PATH")
            TOTAL=$(jq '.numTotalTests // 0' "$TEST_PATH")
            FAILED=$(jq '.numFailedTests // 0' "$TEST_PATH")

            [ -z "$PASSED" ] && PASSED=0
            [ -z "$TOTAL" ] && TOTAL=0

            echo "TEST_MSG=${PASSED}/${TOTAL} passed" >> "$GITHUB_ENV"
            if [ "$FAILED" -gt 0 ] || [ "$TOTAL" -eq 0 ]; then
              echo "TEST_COLOR=red" >> "$GITHUB_ENV"
            else
              echo "TEST_COLOR=brightgreen" >> "$GITHUB_ENV"
            fi
          else
            echo "❌ Error: report.json NOT found at $TEST_PATH"
            find . -name "report.json" -maxdepth 3
          fi

          # 3. Version
          if [ -f ".release-please-manifest.json" ]; then
            VERSION=$(jq -r '."."' .release-please-manifest.json)
          else
            VERSION=$(jq -r '.version' package.json)
          fi
          echo "PKG_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Check README version drift
        if: inputs.check-readme-drift
        run: |
          TS_PKG=$(jq -r '.devDependencies.typescript' package.json)
          NODE_PKG=$(jq -r '.engines.node' package.json)

          TS_README=$(grep -oP '^\|[^|]*TypeScript[^|]*\|\s*\K\S+' README.md)
          NODE_README=$(grep -oP '^\|[^|]*Node\.js[^|]*\|\s*\K\S+' README.md)

          FAIL=0
          if [ "$TS_PKG" != "$TS_README" ]; then
            echo "::error::README TypeScript version ($TS_README) does not match package.json ($TS_PKG)"
            FAIL=1
          fi
          if [ "$NODE_PKG" != "$NODE_README" ]; then
            echo "::error::README Node.js version ($NODE_README) does not match package.json ($NODE_PKG)"
            FAIL=1
          fi
          exit $FAIL

      - name: Build
        if: inputs.build
        run: npm run build

      # ── Badge data → Gist ──────────────────────────────────────

      - name: Push Coverage Badge
        if: always() && github.event_name == 'push' && env.COV_MSG != '' && inputs.test
        uses: schneegans/dynamic-badges-action@e9a478b16159b4d31420099ba146cdc50f134483 # v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: ${{ inputs.gist-id }}
          filename: ${{ env.REPO_NAME }}-${{ github.ref_name }}-coverage.json
          label: coverage
          message: ${{ env.COV_MSG }}
          color: ${{ env.COV_COLOR }}
          style: for-the-badge

      - name: Push Tests Badge
        if: always() && github.event_name == 'push' && env.TEST_MSG != ''
        uses: schneegans/dynamic-badges-action@e9a478b16159b4d31420099ba146cdc50f134483 # v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: ${{ inputs.gist-id }}
          filename: ${{ env.REPO_NAME }}-${{ github.ref_name }}-tests.json
          label: tests
          message: ${{ env.TEST_MSG }}
          color: ${{ env.TEST_COLOR }}
          style: for-the-badge

      - name: Push Build Status Badge
        if: always() && github.event_name == 'push'
        uses: schneegans/dynamic-badges-action@e9a478b16159b4d31420099ba146cdc50f134483 # v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: ${{ inputs.gist-id }}
          filename: ${{ env.REPO_NAME }}-${{ github.ref_name }}-build-status.json
          label: build
          message: ${{ job.status }}
          color: ${{ job.status == 'success' && 'brightgreen' || 'red' }}
          style: for-the-badge

      - name: Push Build Number Badge
        if: always() && github.event_name == 'push'
        uses: schneegans/dynamic-badges-action@e9a478b16159b4d31420099ba146cdc50f134483 # v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: ${{ inputs.gist-id }}
          filename: ${{ env.REPO_NAME }}-${{ github.ref_name }}-build-number.json
          label: "build #"
          message: ${{ github.run_number }}
          color: blue
          style: for-the-badge

      - name: Push Version Badge
        if: always() && github.event_name == 'push'
        uses: schneegans/dynamic-badges-action@e9a478b16159b4d31420099ba146cdc50f134483 # v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: ${{ inputs.gist-id }}
          filename: ${{ env.REPO_NAME }}-${{ github.ref_name }}-version.json
          label: version
          message: ${{ env.PKG_VERSION }}
          color: blue
          style: for-the-badge
