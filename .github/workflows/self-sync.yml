# Self-thin-caller — runs the org-wide reusable Sync workflow against
# this repo, merging main back into dev after every release-please PR
# merge. Named with the self- prefix to distinguish it from the reusable
# sync.yml that lives in this same directory.

name: TeqBench .github - Sync (Main into Dev) Workflow

on:
  push:
    branches: [main]

concurrency:
  group: sync-${{ github.repository }}
  cancel-in-progress: false

jobs:
  sync:
    uses: teqbench/.github/.github/workflows/sync.yml@main
    secrets: inherit
