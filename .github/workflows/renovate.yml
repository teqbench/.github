# ─────────────────────────────────────────────────────────────
# Renovate — Centralized Dependency Management
# ─────────────────────────────────────────────────────────────
# Runs Renovate against all configured teqbench repos.
# Uses the teqbench-devops-gh-app GitHub App for authentication.
#
# Features:
#   - Auto-merge for internal @teqbench packages
#   - PR grouping to reduce noise
#   - Centralized config (one place for all repos)
#
# To add a new repo: update repositories[] in renovate-config.js
# ─────────────────────────────────────────────────────────────

name: Renovate

on:
  schedule:
    - cron: "17 */3 * * *" # Every 3 hours, offset from :00
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  renovate:
    name: Run Renovate
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          client-id: ${{ secrets.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: teqbench

      - name: Checkout config
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Run Renovate
        uses: renovatebot/github-action@6d859fc95779be83a0335ca704879b47e5d79641 # v46.1.16
        with:
          configurationFile: renovate-config.js
          token: ${{ steps.app-token.outputs.token }}
          # renovatebot/github-action runs Renovate in a Docker container
          # and only forwards env vars matching this regex into it. The
          # default does not include `GH_PACKAGES_TOKEN`, so without this
          # override our var arrives as `undefined` inside the container
          # and the hostRules token in renovate-config.js silently drops
          # (manifests as "hostRules[0].token should be a string" warning).
          #
          # This value mirrors the action's default and appends our var.
          # If the action's default changes upstream, sync this list.
          env-regex: '^(?:CI|LANG|LC_ALL|RENOVATE_\w+|NODE_OPTIONS|LOG_LEVEL|HTTP_PROXY|HTTPS_PROXY|NO_PROXY|GITHUB_COM_TOKEN|GH_PACKAGES_TOKEN)$'
        env:
          # Temporary: debug-level logs to diagnose @teqbench/* package
          # lookup failures against npm.pkg.github.com. Remove or downgrade
          # to "info" once GitHub Packages auth is confirmed working.
          LOG_LEVEL: debug
          # GITHUB_TOKEN scoped to this workflow (teqbench/.github) with
          # packages:read. Renovate config can reference this in hostRules
          # for the npm.pkg.github.com host as an alternative to the App
          # token, which has been returning 403 from the GitHub Packages
          # npm registry. Passed through to the Renovate container by the
          # `env-regex` override above.
          GH_PACKAGES_TOKEN: ${{ secrets.GITHUB_TOKEN }}
