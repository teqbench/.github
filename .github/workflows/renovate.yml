# ─────────────────────────────────────────────────────────────
# Renovate — Centralized Dependency Management
# ─────────────────────────────────────────────────────────────
# Runs Renovate against all configured teqbench repos.
# Uses the teqbench-automation GitHub App for authentication.
#
# Features:
#   - Auto-merge for internal @teqbench packages
#   - PR grouping to reduce noise
#   - Centralized config (one place for all repos)
#
# To add a new repo: update repositories[] in renovate-config.js
# ─────────────────────────────────────────────────────────────

name: Renovate

on:
  schedule:
    - cron: "17 */3 * * *" # Every 3 hours, offset from :00
  workflow_dispatch:

permissions: {}

jobs:
  renovate:
    name: Run Renovate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: teqbench

      - name: Checkout config
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Run Renovate
        uses: renovatebot/github-action@68a3ea99af6ad249940b5a9fdf44fc6d7f14378b # v46.1.6
        with:
          configurationFile: renovate-config.js
          token: ${{ steps.app-token.outputs.token }}
