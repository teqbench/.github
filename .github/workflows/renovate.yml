# ─────────────────────────────────────────────────────────────
# Renovate — Centralized Dependency Management
# ─────────────────────────────────────────────────────────────
# Runs Renovate against all configured teqbench repos.
# Uses the teqbench-automation GitHub App for authentication.
#
# Renovate replaces Dependabot with better features:
#   - Auto-merge for internal @teqbench packages
#   - PR grouping to reduce noise
#   - Centralized config (one place for all repos)
#
# To add a new repo: update repositories[] in renovate-config.js
# ─────────────────────────────────────────────────────────────

name: Renovate

on:
  schedule:
    - cron: "17 */3 * * *" # Every 3 hours, offset from :00
  workflow_dispatch:

permissions: {}

jobs:
  renovate:
    name: Run Renovate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout config
        uses: actions/checkout@v6

      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: teqbench

      - name: Run Renovate
        uses: renovatebot/github-action@v46
        with:
          configurationFile: renovate-config.js
          token: ${{ steps.app-token.outputs.token }}
